- hosts: all
  become: yes
  tasks:
    - name: Update the existing package list
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present

    - name: Add Docker's official GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Set up the stable Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Update the package index again
      apt:
        update_cache: yes

    - name: Install Docker Engine
      apt:
        name: docker-ce
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started

    - name: Enable Docker to start on boot
      systemd:
        name: docker
        enabled: yes

    - name: Verify Docker installation
      command: docker --version
      register: docker_version

    - name: Run a test Docker container
      command: docker run hello-world
      when: docker_version is defined and docker_version.stdout is search('Docker version')